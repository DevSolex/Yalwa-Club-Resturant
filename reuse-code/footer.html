<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/output.css" rel="stylesheet">
</head>
<body>
<footer
  class="bg-[1A0C04] border-t border-[rgba(200,151,58,0.25)]
  px-6 md:px-16 py-16 text-center">

  <!-- Logo -->
  <div
    class="text-[2.8rem] font-light text-[#C8973A]
    tracking-widest mb-2 font-[Cormorant_Garamond]">
    YALWA
  </div>

  <!-- Tagline -->
  <div
    class="text-[0.72rem] tracking-[0.3em] uppercase
    text-[#8B7355] mb-10">
    Fine Dining & Lounge · Jos, Nigeria
  </div>

  <!-- Links -->
  <ul
    class="flex flex-wrap justify-center gap-10 mb-10">
    <li>
      <a href="#" onclick="navigate('home')"
        class="text-[#8B7355] text-xs tracking-[0.2em] uppercase
        hover:text-[#C8973A] transition-colors duration-200">
        Home
      </a>
    </li>
    <li>
      <a href="#" onclick="navigate('menu')"
        class="footer-link">
        Menu
      </a>
    </li>
    <li>
      <a href="#" onclick="navigate('about')"
        class="footer-link">
        About
      </a>
    </li>
    <li>
      <a href="#" onclick="navigate('contact')"
        class="footer-link">
        Contact
      </a>
    </li>
    <li>
      <a href="#"
        class="footer-link">
        Privacy
      </a>
    </li>
  </ul>

  <!-- Social Icons -->
  <div
    class="flex justify-center gap-5 mb-10">
    <a href="#" title="Instagram"
      class="w-10 h-10 flex items-center justify-center
      border border-[rgba(200,151,58,0.25)]
      text-[#8B7355]
      hover:border-[#C8973A] hover:text-[#C8973A]
      transition-all duration-200">
      📷
    </a>
    <a href="#" title="Facebook"
      class="social-btn">
      📘
    </a>
    <a href="#" title="Twitter/X"
      class="social-btn">
      🐦
    </a>
    <a href="#" title="WhatsApp"
      class="social-btn">
      💬
    </a>
  </div>

  <!-- Copyright -->
  <p
    class="text-[0.72rem] tracking-widest
    text-[rgba(139,115,85,0.5)]">
    © 2025 Yalwa Club. All rights reserved. Crafted with ♥ in Jos.
  </p>

</footer>
</body>
</html>
