<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/src/output.css" rel="stylesheet">
</head>

<body>
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-1000 flex items-center justify-between px-16 py-5
  bg-linear-to-b from-[rgba(26,12,4,0.95)] to-transparent backdrop-blur-md
  border-b border-[rgba(200,151,58,0.25)] transition-all duration-300">

        <!-- Logo -->
        <a href="#" onclick="navigate('home')" class="text-[1.9rem] font-semibold tracking-[0.12em] text-[#C8973A]
    font-[Cormorant_Garamond] no-underline">
            YALWA<span class="text-[#F5EDD8] font-light italic">club</span>
        </a>

        <!-- Nav Links -->
        <ul id="navLinks" class="hidden md:flex gap-10 list-none">
            <li>
                <a href="#" onclick="navigate('home')" class="relative text-[#F5EDD8] text-xs tracking-[0.2em] uppercase font-medium
        hover:text-[#C8973A] transition-colors duration-200
        after:content-[''] after:absolute after:left-0 after:bottom-0
        after:w-0 after:h-px after:bg-[#C8973A]
        after:transition-all after:duration-300 hover:after:w-full">
                    Home
                </a>
            </li>
            <li>
                <a href="#" onclick="navigate('menu')" class="nav-link">Menu</a>
            </li>
            <li>
                <a href="#" onclick="navigate('about')" class="nav-link">About</a>
            </li>
            <li>
                <a href="#" onclick="navigate('contact')" class="nav-link">Contact</a>
            </li>
        </ul>

        <!-- Reserve Button -->
        <a href="#" onclick="navigate('contact')" class="hidden md:inline-block border border-[#C8973A] text-[#C8973A]
    px-5 py-2 text-[0.7rem] tracking-[0.18em] uppercase
    hover:bg-[#C8973A] hover:text-[#1A0C04]
    transition-all duration-300">
            Reserve a Table
        </a>

        <!-- Hamburger -->
        <div id="hamburger" onclick="toggleMenu()" class="flex md:hidden flex-col gap-5px cursor-pointer">
            <span class="block w-6 h-[1.5px] bg-[#F5EDD8]"></span>
            <span class="block w-6 h-[1.5px] bg-[#F5EDD8]"></span>
            <span class="block w-6 h-[1.5px] bg-[#F5EDD8]"></span>
        </div>
    </nav>
</body>

</html>
